<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, shrink-to-fit=no, viewport-fit=cover"
    />
    <title>%WEB_TITLE%</title>

    <!-- PWA: manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0c1324" />
    <meta name="background-color" content="#0c1324" />

    <!-- iOS: instalación como app standalone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NowSee" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Android/Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }

      /*
       * Experiencia tipo app nativa: sin pinch-to-zoom, sin double-tap
       * zoom, sin el "rebote" (rubber-banding) ni el desplazamiento
       * lateral de toda la página que producen los gestos con varios
       * dedos. `touch-action: manipulation` es la vía estándar (no hacks
       * de JS) para desactivar pinch/double-tap-zoom mientras se sigue
       * permitiendo el scroll normal de cada contenedor (vertical en la
       * página, horizontal en los carruseles con su propio overflow).
       */
      html,
      body {
        touch-action: manipulation;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }
    </style>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("/sw.js").catch(function (err) {
            console.warn("SW registration failed", err);
          });
        });
      }
    </script>
  </body>
</html>
